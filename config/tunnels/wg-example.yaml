# WireGuard connection example (one tunnel, one peer)
# Each connection gets its own file. Copy to /etc/vpnplane/tunnels/ and adapt.
# Run: vpnplane apply

type: wireguard

# Connection name (max 15 chars, used as Linux network interface name)
# This is also the name used in routes and for export: vpnplane export wg-office
name: wg-office

# This machine's IP address on the tunnel network
# If fritzbox: true, this must be the FritzBox tunnel gateway IP with subnet
# (example: 192.168.178.1/24) so site-to-site routing behaves correctly.
address: 192.168.178.1/24

# Enable when the remote side is a FritzBox site-to-site peer.
fritzbox: false

# UDP port this machine listens on (omit for client-only mode)
# Each connection should use a unique port (auto-assigned by: vpnplane tunnel add)
listen_port: 51820

# Path to private key file (generate with: vpnplane keygen --save --name wg-office)
private_key: /etc/wireguard/keys/wg-office.key

# Optional settings
mtu: 1420
dns: []           # e.g. [1.1.1.1, 8.8.8.8]
description: "Office LAN gateway"

# Each tunnel has exactly one peer (the remote endpoint for this connection)
peer:
  name: laptop-alice
  # Peer's WireGuard public key (from: vpnplane keygen on their machine)
  public_key: "REPLACE_WITH_PEERS_PUBLIC_KEY="
  # preshared_key options:
  #   auto  — tool auto-generates and stores a PSK (default, recommended)
  #   null  — disable PSK
  #   /path — read PSK from file
  preshared_key: auto
  # Endpoint: peer's public IP:port (omit if the peer roams / has no fixed IP)
  endpoint: "203.0.113.10:51820"
  # Subnets reachable via this peer
  # Always include the peer's tunnel IP (/32 or /128), plus any subnets behind them
  allowed_ips:
    - 10.10.1.2/32        # peer's tunnel IP
    - fd42:10:10::2/128   # peer's IPv6 tunnel IP (optional)
    - 192.168.10.0/24     # peer's LAN (if this peer is a gateway)
    - fd42:192:168:10::/64 # peer's IPv6 LAN (optional)
  # 25 seconds is recommended for peers behind NAT; 0 to disable
  persistent_keepalive: 25
